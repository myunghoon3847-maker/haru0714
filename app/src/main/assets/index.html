function showTab(id,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active'); if(id==='quiz')newQuiz();}
function speak(text){try{speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='ja-JP'; u.rate=.9; speechSynthesis.speak(u);}catch(e){alert('이 기기에서 음성 기능을 사용할 수 없습니다.')}}
function renderKana(){const arr=document.getElementById('kanaType').value==='hira'?hira:kata; document.getElementById('kanaGrid').innerHTML=arr.map(x=>`<div class="kana" onclick="speak('${x[0]}')"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('');}
function setupCats(){const cats=[...new Set(words.map(w=>w.cat))]; document.getElementById('wordCat').innerHTML='<option value="">전체</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');}
function renderWords(){const q=document.getElementById('wordSearch').value.trim(); const cat=document.getElementById('wordCat').value; const filtered=words.filter(w=>(!cat||w.cat===cat)&&(!q||JSON.stringify(w).includes(q))).slice(0,80); document.getElementById('wordList').innerHTML=filtered.map(w=>`<div class="card"><div class="jp">${w.jp}</div><div class="kanaText">${w.kana}</div><div class="ko">${w.ko}</div><span class="tag">${w.cat}</span><div class="actions"><button class="btn" onclick="speak('${w.jp}')">듣기</button></div></div>`).join('');}
function renderPhrases(){const q=document.getElementById('phraseSearch').value.trim(); const filtered=phrases.filter(p=>!q||JSON.stringify(p).includes(q)); document.getElementById('phraseList').innerHTML=filtered.map(p=>`<div class="card"><div class="jp">${p.jp}</div><div class="ko">${p.ko}</div><span class="tag">${p.tag}</span><div class="actions"><button class="btn" onclick="speak('${p.jp}')">듣기</button></div></div>`).join('');}
function setRandomToday(){const p=phrases[Math.floor(Math.random()*phrases.length)]; document.getElementById('todayPhraseJp').textContent=p.jp; document.getElementById('todayPhraseKo').textContent=p.ko;}
function newQuiz(){const q=words[Math.floor(Math.random()*words.length)]; const choices=[q]; while(choices.length<4){const w=words[Math.floor(Math.random()*words.length)]; if(!choices.some(c=>c.ko===w.ko))choices.push(w);} choices.sort(()=>Math.random()-.5); document.getElementById('quizQuestion').textContent=q.jp; document.getElementById('quizAnswers').innerHTML=choices.map(c=>`<button class="answer" onclick="checkQuiz('${c.ko.replace(/'/g,'\\'')}','${q.ko.replace(/'/g,'\\'')}')">${c.ko}</button>`).join(''); document.getElementById('quizResult').textContent='';}
function checkQuiz(a,b){document.getElementById('quizResult').textContent=a===b?'정답입니다!':'아쉬워요. 정답: '+b;}
renderKana(); setupCats(); renderWords(); renderPhrases(); setRandomToday();

name: Android Build Check

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Java 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK 설치
        uses: android-actions/setup-android@v3

      - name: Gradle 설치
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Android 프로젝트 위치 찾기
        shell: bash
        run: |
          echo "저장소 파일 구조 확인"
          find . -maxdepth 4 -type f | sort | head -200

          SETTINGS_FILE=$(find . -maxdepth 5 -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -n 1)

          if [ -z "$SETTINGS_FILE" ]; then
            echo "settings.gradle 파일을 찾지 못했습니다."
            echo "압축 푼 폴더 자체가 아니라, 그 안의 app / build.gradle / settings.gradle 파일들이 GitHub 첫 화면에 보이게 올려야 합니다."
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android 프로젝트 위치: $PROJECT_DIR"

      - name: Debug APK 빌드
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew :app:assembleDebug
          else
            gradle :app:assembleDebug
          fi

      - name: Release AAB 빌드
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew :app:bundleRelease
          else
            gradle :app:bundleRelease
          fi

      - name: 빌드 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: harunihon-build-files
          path: |
            ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
            ${{ env.PROJECT_DIR }}/app/build/outputs/bundle/release/*.aab
